name: deploy

# Build the api/web images, push to ECR, run the one-off DB migrate task, then
# roll the services. Auth is keyless via GitHub OIDC -> the Terraform-created
# deploy role (no long-lived AWS keys). Golden Rule #6.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write # required for OIDC
  contents: read

env:
  AWS_REGION: eu-west-1
  PROJECT: sms
  CLUSTER: sms-prod

jobs:
  deploy:
    # ARM runner: builds linux/arm64 images NATIVELY (no QEMU slowdown) to match
    # the Fargate Graviton runtime_platform (terraform cpu_architecture=ARM64).
    # If cpu_architecture is ever flipped back to X86_64, change this to
    # ubuntu-latest in the same commit — images and tasks must always match.
    runs-on: ubuntu-24.04-arm
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push images
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          # SHA tags ONLY: the ECR repos are tag-IMMUTABLE (supply-chain guard),
          # so a moving `latest` tag would fail on the second push. Terraform's
          # image_tag default ("latest") is a first-boot placeholder — services
          # come up on the first CI deploy, which registers SHA-tagged task defs.
          for svc in api web; do
            docker build --platform linux/arm64 -f apps/$svc/Dockerfile \
              -t "$REGISTRY/$PROJECT/$svc:$TAG" .
            docker push "$REGISTRY/$PROJECT/$svc:$TAG"
          done

      - name: Point one-off task defs (migrate, retention) at the new image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          # These task defs aren't touched by `update-service` below, and the
          # Terraform-registered revision references a :latest tag that is never
          # pushed (SHA-only, IMMUTABLE repos). Re-register each with the SHA
          # image; the retention schedule targets the revision-less ARN, so it
          # picks the new revision up automatically.
          for family in migrate retention; do
            DEF=$(aws ecs describe-task-definition \
              --task-definition "${PROJECT}-prod-$family" --query 'taskDefinition')
            NEW=$(echo "$DEF" | jq \
              --arg img "$REGISTRY/$PROJECT/api:$TAG" '
              .containerDefinitions[0].image = $img
              | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')
            aws ecs register-task-definition --cli-input-json "$NEW" \
              --query 'taskDefinition.taskDefinitionArn' --output text
          done

      - name: Run DB migrate (one-off task, wait for completion)
        run: |
          SUBNETS=$(aws ec2 describe-subnets \
            --filters "Name=tag:Name,Values=${PROJECT}-prod-private-*" \
            --query 'Subnets[].SubnetId' --output text | tr '\t' ',')
          SG=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=${PROJECT}-prod-api" \
            --query 'SecurityGroups[0].GroupId' --output text)
          TASK_ARN=$(aws ecs run-task --cluster "$CLUSTER" \
            --task-definition "${PROJECT}-prod-migrate" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)
          echo "migrate task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"
          CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "migrate exit code: $CODE"
          test "$CODE" = "0"

      - name: Deploy services (new image tag)
        env:
          TAG: ${{ github.sha }}
        run: |
          for svc in api web; do
            # Pull the live task def, swap only the image, re-register, update.
            DEF=$(aws ecs describe-task-definition \
              --task-definition "${PROJECT}-prod-$svc" --query 'taskDefinition')
            REGISTRY="${{ steps.ecr.outputs.registry }}"
            NEW=$(echo "$DEF" | jq \
              --arg img "$REGISTRY/$PROJECT/$svc:$TAG" '
              .containerDefinitions[0].image = $img
              | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')
            ARN=$(aws ecs register-task-definition \
              --cli-input-json "$NEW" \
              --query 'taskDefinition.taskDefinitionArn' --output text)
            aws ecs update-service --cluster "$CLUSTER" \
              --service "${PROJECT}-prod-$svc" --task-definition "$ARN"
          done
          aws ecs wait services-stable --cluster "$CLUSTER" \
            --services "${PROJECT}-prod-api" "${PROJECT}-prod-web"
