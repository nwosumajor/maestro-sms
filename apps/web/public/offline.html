<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Offline — SMS</title>
<style>
  :root { color-scheme: light dark; }
  body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:#f8fafc; color:#0f172a; }
  @media (prefers-color-scheme: dark){ body{ background:#0b1220; color:#e2e8f0; } .card{ background:#0f172a; border-color:#1e293b; } }
  .card { max-width:28rem; margin:1.5rem; padding:2rem; text-align:center; background:#fff; border:1px solid #e2e8f0; border-radius:1rem; }
  .icon { width:56px; height:56px; margin:0 auto 1rem; }
  h1 { font-size:1.25rem; margin:0 0 .5rem; }
  p { margin:0 0 1.25rem; color:#64748b; line-height:1.5; }
  button { font:inherit; padding:.6rem 1.1rem; border-radius:.6rem; border:0; background:#0f172a; color:#fff; cursor:pointer; }
  @media (prefers-color-scheme: dark){ button{ background:#38bdf8; color:#0b1220; } p{ color:#94a3b8; } }
</style>
</head>
<body>
  <div class="card">
    <img class="icon" src="/icon.svg" alt=""/>
    <h1>You're offline</h1>
    <p>This page needs a connection. Your school data is never stored on this device for privacy — reconnect to continue.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
