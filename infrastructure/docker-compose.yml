# =============================================================================
# SMS — local orchestration
# =============================================================================
#   cd infrastructure && cp .env.example .env && docker compose up --build
#
# Only nginx is published (80/443). Postgres and Redis publish NO host ports —
# they're reachable ONLY by the backend over the internal `appnet` bridge. The
# backend waits for both to pass healthchecks before it starts (depends_on:
# service_healthy), then runs migrations + RLS, then serves.
#
# NOTE: LMS content lives in Postgres (JSONB) per the chosen single-RLS model, so
# there is no MongoDB service. To add it, give it its OWN tenant-isolation layer.
# =============================================================================

name: sms

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [appnet]
    # No `ports:` — never exposed to the host.

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [appnet]
    # No `ports:` — internal only.

  backend:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      network: host # build-time egress to the npm registry
    environment:
      NODE_ENV: production
      API_PORT: "3001"
      WEB_ORIGIN: http://localhost
      AUTH_SECRET: ${AUTH_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # App connects as the least-privilege role (RLS enforced). Defaults to a
      # DIRECT writer connection; override DATABASE_URL in .env to route through
      # the opt-in pgbouncer pooler (see the `pgbouncer` service below).
      DATABASE_URL: ${DATABASE_URL:-postgresql://major_user:${APP_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      # Migrations + RLS grants run as the superuser.
      DATABASE_MIGRATE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SEED_ON_START: ${SEED_ON_START:-false}
      # Field-level PII encryption (medical). 32-byte base64; from a secrets
      # manager in prod. Unset => encryption disabled (plaintext).
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:-Q5gcF3Ehy9TDmCWdhBIcu3BMCdoapo/z6xroVbv6zoE=}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [appnet]
    # No `ports:` — reached only by the frontend/nginx over appnet.

  frontend:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      network: host # build-time egress to the npm registry
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET}
      # Server-side + BFF calls reach the backend over the internal network.
      API_BASE_URL: http://backend:3001
    depends_on:
      - backend
    networks: [appnet]
    # No `ports:` — fronted by nginx.

  # OPTIONAL connection pooler — local parity with the prod RDS Proxy
  # (infrastructure/terraform/rds_proxy.tf), scaling Phase 2. Opt-in so the
  # default stack is unchanged:
  #     docker compose --profile pooler up --build
  # then point the app through it in infrastructure/.env:
  #     DATABASE_URL=postgresql://major_user:${APP_DB_PASSWORD}@pgbouncer:6432/sms?pgbouncer=true
  # Transaction pooling is SAFE with our RLS model — the tenant GUC is
  # transaction-local (set_config(..., true)), verified by running the full RLS
  # e2e suite THROUGH this pooler (141/141 green, isolation intact). Migrations
  # still use DATABASE_MIGRATE_URL (direct writer), never the pooler.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    profiles: [pooler]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: major_user
      DB_PASSWORD: ${APP_DB_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      ADMIN_USERS: major_user
    depends_on:
      postgres:
        condition: service_healthy
    networks: [appnet]
    # No host `ports:` — reached only by the backend over appnet.

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    networks: [appnet]

volumes:
  pg_data:
  redis_data:

networks:
  appnet:
    driver: bridge
