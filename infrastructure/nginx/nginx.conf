# =============================================================================
# Reverse proxy. Browser -> nginx -> Next.js frontend. The backend is NOT proxied
# directly: the frontend owns auth (/api/auth) and the BFF (/api/sms), and reaches
# the backend internally over appnet. Keeping the backend un-proxied means it is
# never reachable from the host — the most restrictive option.
# (To expose the API directly, add a `location /api/backend/` -> backend:3001.)
# =============================================================================
worker_processes auto;
events { worker_connections 1024; }

http {
  sendfile on;
  server_tokens off;
  client_max_body_size 25m;

  upstream frontend { server frontend:3000; }
  upstream backend { server backend:3001; }

  server {
    listen 80;
    server_name _;

    # Security headers (baseline; tune CSP per app).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Live game WebSockets only. This is the ONE backend path reachable from the
    # host — a deliberate, narrow exception to the "backend is never proxied" rule
    # so browsers can reach the /ws/* gateway same-origin. It is auth-gated: the
    # gateway verifies the HS256 handshake token (?token=) and closes 4401 without
    # one. REST stays internal-only (the BFF mints the bearer server-side). The
    # handshake token is short-lived; keep it out of access logs.
    location /ws/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 1h; # long-lived spectator sockets
      access_log off;        # avoid logging the ?token= handshake credential
    }

    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }

  # TLS on 443: mount certs and uncomment in production.
  # server {
  #   listen 443 ssl;
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   location / { proxy_pass http://frontend; ... }
  # }
}
